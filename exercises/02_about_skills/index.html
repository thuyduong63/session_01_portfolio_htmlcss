<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About + Skills</title>

    <!-- QUAN TRỌNG -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ABOUT -->
<section id="about" class="about-section">
    <div class="container">
        <div class="about-grid">
            <div class="about-image">
                <img src="https://via.placeholder.com/400x400" alt="Profile Photo">
            </div>
            <div class="about-content">
                <h2>About Me</h2>
                <p class="lead">I'm a passionate developer with 3+ years of experience building web applications.</p>
                <p>Specialized in Frontend development with React and Vue.</p>
            </div>
        </div>
    </div>
</section>

<!-- SKILLS -->
<section id="skills" class="skills-section">
    <div class="container">
        <h2>My Skills</h2>

        <div class="skills-grid">

            <div class="skill-item">
                <span class="skill-name">HTML</span>
                <div class="skill-bar">
                    <div class="skill-progress" data-width="95%"></div>
                </div>
            </div>

            <div class="skill-item">
                <span class="skill-name">CSS</span>
                <div class="skill-bar">
                    <div class="skill-progress" data-width="90%"></div>
                </div>
            </div>

            <div class="skill-item">
                <span class="skill-name">JavaScript</span>
                <div class="skill-bar">
                    <div class="skill-progress" data-width="80%"></div>
                </div>
            </div>

            <div class="skill-item">
                <span class="skill-name">React</span>
                <div class="skill-bar">
                    <div class="skill-progress" data-width="75%"></div>
                </div>
            </div>

        </div>
    </div>
</section>

<script src="script.js"></script>

</body>
</html>
