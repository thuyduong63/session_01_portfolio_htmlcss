<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact + Footer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- CONTACT -->
<section id="contact" class="contact-section">
    <div class="container">
        <h2>Get In Touch</h2>

        <div class="contact-wrapper">

            <div class="contact-info">
                <h3>Contact Information</h3>
                <p>Feel free to reach out. I'm always open to discussing new projects.</p>

                <div class="info-item">
                    <span>📧</span>
                    <span>your.email@example.com</span>
                </div>

                <div class="info-item">
                    <span>📍</span>
                    <span>Hanoi, Vietnam</span>
                </div>
            </div>

            <form class="contact-form">

                <div class="form-group">
                    <label>Name</label>
                    <input type="text" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" required>
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>

            </form>

        </div>
    </div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <div class="container">

        <div class="footer-content">
            <div class="footer-logo">YourName</div>
            <p>Building digital experiences</p>

            <div class="social-links">
                <a href="#" class="social-link">G</a>
                <a href="#" class="social-link">L</a>
                <a href="#" class="social-link">E</a>
            </div>
        </div>

        <div class="footer-bottom">
            <p>© 2026 YourName</p>
        </div>

    </div>
</footer>

</body>
</html>
